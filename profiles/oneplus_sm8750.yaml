# Device profile: OnePlus SM8750 family (OP13 CPH2653)
# Seeded from LineageOS android_device_oneplus_dodge proprietary-firmware.txt
# and android_device_oneplus_sm8750-common

device_family: oneplus_sm8750
codename: dodge
lineage_device_repo: LineageOS/android_device_oneplus_dodge
lineage_common_repo: LineageOS/android_device_oneplus_sm8750-common
soc: sm8750

known_devices:
    - model: CPH2653
      name: "OnePlus 13"
      short: dodge
    - model: CPH2747
      name: "OnePlus 13T"
      short: OP15

# Partitions grouped by role.
# These are the partitions tracked by the framework.
# "firmware" = non-HLOS images that the bootloader/TEE/subsystem use directly.
# "boundary" = images at the handoff between firmware and Android (kernel, vbmeta, etc.)
# "hlos" = Android userspace partitions (not tracked for firmware audit purposes).

partitions:
    boot_chain:
        - xbl
        - xbl_config
        - abl
        - uefi
        - tz
        - hyp
        - aop
        - aop_config
        - devcfg
        - engineering_cdt
        - keymaster
        - uefisecapp
        - oplus_sec
        - pvmfw

    subsystem_firmware:
        - modem
        - bluetooth
        - dsp
        - qupfw
        - cpucp
        - cpucp_dtb
        - shrm
        - pdp
        - pdp_cdb
        - soccp_debug
        - soccp_dcd
        - featenabler
        - spuservice
        - imagefv
        - secretkeeper
        - multiimgqti
        - multiimgoem
        - tme_fw
        - tme_config
        - tme_seq_patch
        - dcp

    low_priority:
        - splash
        - xbl_ramdump
        - oplusstanvbk

    boundary:
        - boot
        - init_boot
        - vendor_boot
        - dtbo
        - vbmeta
        - vbmeta_system
        - vbmeta_vendor
        - recovery
